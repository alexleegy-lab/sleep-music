<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
  <title>Sleep Music Abstract Background</title>
  <style>
    :root {
      --text-main: rgba(255, 255, 255, .92);
      --text-soft: rgba(255, 255, 255, .68);
      --text-faint: rgba(255, 255, 255, .44);
      --line-soft: rgba(255, 255, 255, .22);
      --button: rgba(255, 255, 255, .12);
      --button-active: rgba(255, 255, 255, .23);
      font-family: "Inter", "SF Pro Display", "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", sans-serif;
    }

    * {
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
    }

    html,
    body {
      width: 100%;
      height: 100%;
      margin: 0;
      padding: 0;
      background: #050506;
      color: var(--text-main);
      overflow: hidden;
    }

    /* 满屏舞台 */
    .stage {
      position: relative;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #020203;
      isolation: isolate;
    }

    /* 画布完全铺满 */
    canvas {
      position: absolute;
      inset: 0;
      width: 100% !important;
      height: 100% !important;
      z-index: 0;
    }

    /* 满屏暗角遮罩 */
    .vignette {
      position: absolute;
      inset: 0;
      z-index: 1;
      pointer-events: none;
      background:
        radial-gradient(circle at 50% 50%, rgba(18, 25, 42, .02), rgba(0, 0, 0, .18) 36%, rgba(0, 0, 0, .74) 82%),
        linear-gradient(180deg, rgba(0, 0, 0, .38) 0%, rgba(0, 0, 0, .04) 32%, rgba(0, 0, 0, .2) 68%, rgba(0, 0, 0, .64) 100%);
    }

    /* UI 容器自适应 */
    .ui {
      position: absolute;
      inset: 0;
      z-index: 2;
      pointer-events: none;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: env(safe-area-inset-top, 20px) 24px calc(env(safe-area-inset-bottom, 20px) + 15px) 24px;
    }

    .play-icon,
    .reset-icon {
      position: relative;
      display: block;
    }

    /* 头部文案区域 */
    .hero {
      margin-top: 18vh;
      width: 100%;
      max-width: 420px;
      text-align: center;
      display: flex;
      flex-direction: column;
      align-items: center;
      pointer-events: auto;
      gap: 12px;
    }

    h1 {
      margin: 0;
      font-size: 32px;
      line-height: 1.2;
      font-weight: 500;
      color: var(--text-main);
      letter-spacing: 2px;
      text-shadow: 0 0 22px rgba(255, 255, 255, .08);
    }

    .ai-note {
      color: var(--text-soft);
      font-size: 13px;
      line-height: 1.4;
      text-align: center;
      padding: 0 10px;
    }

    .heart-rate {
      color: var(--text-faint);
      font-size: 12px;
      line-height: 1.2;
    }

    /* 撑开中间空间 */
    .spacer {
      flex: 1;
    }

    /* 状态面板 */
    .status-panel {
      width: 100%;
      max-width: 420px;
      margin-bottom: 24px;
      color: var(--text-soft);
      font-size: 12px;
      pointer-events: auto;
      text-shadow: 0 1px 10px rgba(0, 0, 0, .35);
    }

    .status-top,
    .metrics {
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .status-top {
      margin-bottom: 14px;
      color: rgba(255, 255, 255, .74);
    }

    .status-title {
      font-size: 14px;
      line-height: 1;
    }

    .weather {
      font-size: 12px;
      color: rgba(255, 255, 255, .58);
    }

    .metrics {
      width: 100%;
      color: rgba(255, 255, 255, .48);
      font-size: 12px;
    }

    .metric {
      flex: 1;
      text-align: center;
      white-space: nowrap;
    }
    .metric:first-child { text-align: left; }
    .metric:last-child { text-align: right; }

    .divider {
      width: 1px;
      height: 12px;
      background: var(--line-soft);
    }

    /* 播放器栏控制 */
    .player {
      width: 100%;
      max-width: 420px;
      height: 44px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      pointer-events: auto;
      text-shadow: 0 1px 10px rgba(0, 0, 0, .35);
      margin-bottom: 16px;
    }

    /* 胶囊型歌曲名与动效背景 */
    .track {
      height: 44px;
      display: flex;
      align-items: center;
      gap: 10px;
      color: rgba(255, 255, 255, .78);
      background: var(--button);
      box-shadow: inset 0 0 0 1px rgba(255, 255, 255, 0.12);
      padding: 0 16px 0 12px;
      border-radius: 22px;
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
    }

    .glow-ring {
      width: 16px;
      height: 16px;
      position: relative;
      flex: 0 0 auto;
      display: inline-block;
      border-radius: 50%;
      background: conic-gradient(from 0deg, #5ca2ff 0%, #b85eff 40%, #00f2fe 75%, #5ca2ff 100%);
      -webkit-mask: radial-gradient(circle, transparent 45%, #000 50%);
      mask: radial-gradient(circle, transparent 45%, #000 50%);
      filter: drop-shadow(0 0 6px rgba(147, 51, 234, 0.85)) drop-shadow(0 0 2px rgba(6, 182, 212, 0.4));
      animation: ringRotate 3.2s linear infinite, ringGlow 2.5s ease-in-out infinite alternate;
    }

    .track-name {
      font-size: 16px;
      line-height: 16px;
      font-weight: 400;
      letter-spacing: 0;
      white-space: nowrap;
    }

    .controls {
      width: 104px;
      height: 44px;
      display: flex;
      justify-content: space-between;
    }

    .round-control {
      width: 44px;
      height: 44px;
      border: 0;
      border-radius: 50%;
      color: rgba(255, 255, 255, .88);
      background: var(--button);
      box-shadow: inset 0 0 0 1px rgba(255, 255, 255, .16);
      display: grid;
      place-items: center;
      cursor: pointer;
      transition: transform .25s ease, background .25s ease, box-shadow .25s ease;
    }

    .round-control:hover,
    .round-control.active {
      background: var(--button-active);
      box-shadow: inset 0 0 0 1px rgba(255, 255, 255, .24), 0 0 22px rgba(255, 255, 255, .08);
    }

    .round-control:active {
      transform: scale(.94);
    }

    .play-icon {
      width: 18px;
      height: 18px;
    }

    .play-icon::before,
    .play-icon::after {
      content: "";
      position: absolute;
      top: 1px;
      width: 5px;
      height: 16px;
      border-radius: 2px;
      background: currentColor;
      transition: all .2s ease;
    }

    .play-icon::before { left: 3px; }
    .play-icon::after { right: 3px; }

    .paused .play-icon::before {
      left: 5px;
      top: 2px;
      width: 0;
      height: 0;
      border-top: 7px solid transparent;
      border-bottom: 7px solid transparent;
      border-left: 11px solid currentColor;
      background: transparent;
      border-radius: 0;
    }

    .paused .play-icon::after {
      opacity: 0;
      transform: translateX(5px);
    }

    .reset-image {
      width: 22px;
      height: 22px;
      display: block;
      object-fit: contain;
      pointer-events: none;
    }

    .ai-label {
      width: 100%;
      color: rgba(255, 255, 255, .34);
      font-size: 12px;
      line-height: 12px;
      text-align: center;
      pointer-events: none;
      margin-bottom: 8px;
    }

    .home-indicator {
      width: 100%;
      display: grid;
      place-items: center;
      pointer-events: none;
    }

    .home-indicator::before {
      content: "";
      width: 134px;
      height: 5px;
      border-radius: 99px;
      background: rgba(255, 255, 255, .4);
    }

    @keyframes ringRotate {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }

    @keyframes ringGlow {
      0% { filter: drop-shadow(0 0 4px rgba(147, 51, 234, 0.7)) brightness(0.9); opacity: 0.85; }
      100% { filter: drop-shadow(0 0 9px rgba(0, 242, 254, 1)) brightness(1.25); opacity: 1; }
    }
  </style>
</head>
<body>
  <main class="stage" aria-label="助眠音乐动态背景界面">
    <canvas id="field" aria-hidden="true"></canvas>
    <div class="vignette" aria-hidden="true"></div>
    
    <section class="ui">
      <div class="hero">
        <h1>助眠</h1>
        <div class="ai-note">
          <span id="aiText">日间压力相比往常偏大，AI已增强G大调与海浪声</span>
        </div>
        <div class="heart-rate" id="heartRate">当前心率：60次/分钟</div>
      </div>

      <div class="spacer"></div>

      <div class="status-panel" aria-label="今日状态">
        <div class="status-top">
          <span class="status-title">今日状态</span>
          <span class="weather">23°C / 阴</span>
        </div>
        <div class="metrics">
          <span class="metric">压力均值：44</span>
          <span class="divider" aria-hidden="true"></span>
          <span class="metric">愉悦占比：25%</span>
          <span class="divider" aria-hidden="true"></span>
          <span class="metric">HRV均值：36ms</span>
        </div>
      </div>

      <div class="player" aria-label="音乐播放器">
        <div class="track">
          <span class="glow-ring" aria-hidden="true"></span>
          <span class="track-name" id="trackName">林间清泉</span>
        </div>
        <div class="controls">
          <button id="playPause" class="round-control active" type="button" aria-label="暂停">
            <span class="play-icon" aria-hidden="true"></span>
          </button>
          <button id="regenerate" class="round-control" type="button" aria-label="重新生成音乐与异色系渐变">
            <svg class="reset-image" viewBox="0 0 24 24" fill="none" aria-hidden="true">
              <path d="M20 6v5h-5" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
              <path d="M20 11a8 8 0 1 1-2.34-5.66L20 6" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
            </svg>
          </button>
        </div>
      </div>

      <div class="ai-label">本音乐由AI生成</div>
      
    </section>
  </main>

  <script>
    const canvas = document.getElementById("field");
    const ctx = canvas.getContext("2d");
    const playPause = document.getElementById("playPause");
    const regenerate = document.getElementById("regenerate");
    const aiText = document.getElementById("aiText");
    const heartRate = document.getElementById("heartRate");
    const trackName = document.getElementById("trackName");

    let W = window.innerWidth;
    let H = window.innerHeight;
    let dpr = Math.min(window.devicePixelRatio || 1, 2);
    let playing = true;
    let mode = 0;
    let seed = Math.random() * 1000;
    let tempo = 1;
    let last = performance.now();
    let phase = 0;

    const notes = [
      "日间压力相比往常偏大，AI已增强G大调与海浪声",
      "当前状态平衡，声音顺着节奏自然展开",
      "夜间心率趋稳，AI正在降低泛音亮度"
    ];

    const trackNames = [
      "林间清泉",
      "月下沉静",
      "星空漫游"
    ];

    // ==========================================
    // 🎵 WEB AUDIO API 助眠生成器引擎
    // ==========================================
    let audioCtx = null;
    let musicTimer = null;
    let waveNoiseNode = null;
    let waveGain = null;
    let masterGain = null;

    const modesAudio = [
      { base: 196.00, scale: [0, 2, 4, 7, 9, 12, 14, 16] }, // G Major Pentatonic
      { base: 130.81, scale: [0, 2, 4, 7, 9, 11, 12, 14] }, // C Major
      { base: 174.61, scale: [0, 2, 5, 7, 9, 12, 14, 16] }  // F Major
    ];

    function initAudio() {
      if (audioCtx) return;
      
      const AudioContext = window.AudioContext || window.webkitAudioContext;
      audioCtx = new AudioContext();

      masterGain = audioCtx.createGain();
      masterGain.gain.setValueAtTime(0.5, audioCtx.currentTime);
      masterGain.connect(audioCtx.destination);

      createSeaWave();
      scheduler();
    }

    function createSeaWave() {
      const bufferSize = audioCtx.sampleRate * 2;
      const buffer = audioCtx.createBuffer(1, bufferSize, audioCtx.sampleRate);
      const data = buffer.getChannelData(0);
      for (let i = 0; i < bufferSize; i++) {
        data[i] = Math.random() * 2 - 1;
      }

      const noise = audioCtx.createBufferSource();
      noise.buffer = buffer;
      noise.loop = true;

      const filter = audioCtx.createBiquadFilter();
      filter.type = 'lowpass';
      filter.frequency.setValueAtTime(350, audioCtx.currentTime);
      filter.Q.setValueAtTime(1, audioCtx.currentTime);

      waveGain = audioCtx.createGain();
      waveGain.gain.setValueAtTime(0.08, audioCtx.currentTime);

      noise.connect(filter);
      filter.connect(waveGain);
      waveGain.connect(masterGain);
      noise.start();
      
      waveNoiseNode = noise;
      animateWave();
    }

    function animateWave() {
      if (!audioCtx || !playing) {
        setTimeout(animateWave, 500);
        return;
      }
      const t = audioCtx.currentTime;
      const cycle = Math.sin(t * 0.78) * 0.05 + 0.07; 
      if (waveGain) waveGain.gain.linearRampToValueAtTime(cycle * (mode === 0 ? 1.4 : 1.0), t + 0.4);
      setTimeout(animateWave, 400);
    }

    // 基础氛围音符发生器 (Pad 织体)
    function playNote(freq, duration, customVol = 0.12) {
      if (!audioCtx || !playing) return;

      const t = audioCtx.currentTime;
      const osc = audioCtx.createOscillator();
      const gainNode = audioCtx.createGain();
      
      osc.type = Math.random() > 0.5 ? 'sine' : 'triangle';
      osc.frequency.setValueAtTime(freq, t);

      const filter = audioCtx.createBiquadFilter();
      filter.type = 'lowpass';
      filter.frequency.setValueAtTime(mode === 2 ? 450 : 800, t); 

      gainNode.gain.setValueAtTime(0, t);
      gainNode.gain.linearRampToValueAtTime(customVol, t + 0.6); 
      gainNode.gain.exponentialRampToValueAtTime(0.001, t + duration);

      osc.connect(filter);
      filter.connect(gainNode);
      gainNode.connect(masterGain);

      osc.start(t);
      osc.stop(t + duration);
    }

    // 🛠️ 新增：轻柔独奏钢琴音色发生器 (具有高复合泛音和物理钢琴衰减曲线)
    function playPiano(freq, duration, customVol = 0.1) {
      if (!audioCtx || !playing) return;
      const t = audioCtx.currentTime;

      // 钢琴的声音包含基音和多个微调不均匀的泛音列，我们用 3 个振荡器进行拟真合成
      const harmonics = [1, 2, 3]; 
      const masterGainNode = audioCtx.createGain();
      
      masterGainNode.gain.setValueAtTime(0, t);
      // 模拟微风拂过钢琴琴弦的超轻极速敲击感 (仅 0.01s 淡入)
      masterGainNode.gain.linearRampToValueAtTime(customVol, t + 0.01);
      // 极其顺滑的指数衰减曲线，模拟琴弦余音
      masterGainNode.gain.exponentialRampToValueAtTime(0.001, t + duration);

      harmonics.forEach((harmonic, index) => {
        const osc = audioCtx.createOscillator();
        const gainNode = audioCtx.createGain();
        
        // 三角波提供温暖的木质感，正弦波填充空气感
        osc.type = harmonic === 1 ? 'triangle' : 'sine';
        // 微弱偏频抖动让多音色听起来更生动自然
        const detune = (Math.random() * 4 - 2); 
        osc.frequency.setValueAtTime(freq * harmonic, t);
        if(osc.detune) osc.detune.setValueAtTime(detune, t);

        // 高频泛音随时间比基音衰减得更快
        const volFactor = index === 0 ? 1.0 : (index === 1 ? 0.4 : 0.15);
        gainNode.gain.setValueAtTime(volFactor, t);

        osc.connect(gainNode);
        gainNode.connect(masterGainNode);
        osc.start(t);
        osc.stop(t + duration);
      });

      // 经过低通滤波软化，剔除高频电子合成器的刺耳杂音
      const pianoFilter = audioCtx.createBiquadFilter();
      pianoFilter.type = 'lowpass';
      pianoFilter.frequency.setValueAtTime(900, t);

      masterGainNode.connect(pianoFilter);
      pianoFilter.connect(masterGain);
    }

    // 音乐实时随机调度引擎
    function scheduler() {
      if (playing) {
        const currentAudioMode = modesAudio[mode];
        const step = currentAudioMode.scale[Math.floor(Math.random() * currentAudioMode.scale.length)];
        const freq = currentAudioMode.base * Math.pow(2, step / 12);
        
        // 1. 渲染长音背景衬底
        const duration = 2.5 + Math.random() * 2.5;
        playNote(freq, duration, 0.1);
        
        // 2. 🛠️ 主题独立元素控制逻辑
        if (mode === 0) {
          // 【林间清泉】专属：额外触发优雅轻柔的纯净独奏钢琴音符
          if (Math.random() > 0.3) {
            // 在原本音程上提高 1 到 2 个八度，营造剔透清凉的钢琴独奏旋律线
            const octaveShift = Math.random() > 0.5 ? 2 : 4;
            const pianoFreq = freq * octaveShift;
            const pianoDuration = 1.5 + Math.random() * 2.0;
            // 异步稍微延迟发出，制造错落有致的清泉即兴演奏效果
            setTimeout(() => {
              playPiano(pianoFreq, pianoDuration, 0.05);
            }, Math.random() * 400);
          }
          
          // 原本的灵动微弱水滴滴落声
          if (Math.random() > 0.5) {
            const waterFreq = 1400 + Math.random() * 400;
            playNote(waterFreq, 0.3, 0.012); 
          }
        } else if (mode === 2) {
          // 【星空漫游】专属微弱脉冲
          if (Math.random() > 0.5) {
            playNote(3500, 0.15, 0.003);
          }
        }
        
        // 温暖大三和弦根音支撑层
        if (Math.random() > 0.75) {
          playNote(currentAudioMode.base * 0.5, 6.0, 0.07);
        }
      }
      
      // 无固定拍号的随机发音间隔，完美防止大脑捕捉规律，更快速入眠
      const nextTick = 1100 + Math.random() * 1500;
      musicTimer = setTimeout(scheduler, nextTick);
    }

    // ==========================================
    // 原有视觉渲染及逻辑控制
    // ==========================================
    function resize() {
      W = window.innerWidth;
      H = window.innerHeight;
      dpr = Math.min(window.devicePixelRatio || 1, 2);
      
      canvas.width = W * dpr;
      canvas.height = H * dpr;
      ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
    }

    function palette() {
      if (mode === 1) {
        return {
          glowA: "rgba(0, 255, 180, ",  
          glowB: "rgba(0, 140, 255, ",  
          glowC: "rgba(180, 0, 255, ",  
          line: "rgba(220, 245, 255, ",
          point: "rgba(255, 255, 255, "
        };
      }
      if (mode === 2) {
        return {
          glowA: "rgba(255, 60, 0, ",   
          glowB: "rgba(255, 0, 110, ",  
          glowC: "rgba(130, 0, 255, ",  
          line: "rgba(255, 235, 240, ",
          point: "rgba(255, 255, 255, "
        };
      }
      return {
        glowA: "rgba(128, 88, 255, ",   
        glowB: "rgba(198, 76, 255, ",
        glowC: "rgba(77, 119, 255, ",
        line: "rgba(238, 234, 255, ",
        point: "rgba(255, 255, 255, "
      };
    }

    function fillBackground(p) {
      const base = ctx.createLinearGradient(0, 0, W, H);
      if (mode === 1) {
        base.addColorStop(0, "#01040a");
        base.addColorStop(1, "#020105");
      } else if (mode === 2) {
        base.addColorStop(0, "#080102");
        base.addColorStop(1, "#030008");
      } else {
        base.addColorStop(0, "#050018");
        base.addColorStop(1, "#03000a");
      }
      ctx.fillStyle = base;
      ctx.fillRect(0, 0, W, H);

      ctx.save();
      ctx.globalCompositeOperation = "screen";
      const washes = [
        { x: W * (.18 + Math.sin(phase * .18) * .08), y: H * .18, r: Math.max(W, H) * 0.4, c: p.glowB, a: .36 },
        { x: W * (.86 + Math.cos(phase * .14) * .06), y: H * .34, r: Math.max(W, H) * 0.45, c: p.glowA, a: .3 },
        { x: W * (.34 + Math.sin(phase * .11 + 2) * .08), y: H * .82, r: Math.max(W, H) * 0.45, c: p.glowB, a: .28 },
        { x: W * (.72 + Math.cos(phase * .16 + 1) * .08), y: H * .72, r: Math.max(W, H) * 0.4, c: p.glowC, a: .22 }
      ];
      washes.forEach((wash) => {
        const g = ctx.createRadialGradient(wash.x, wash.y, 0, wash.x, wash.y, wash.r);
        g.addColorStop(0, wash.c + wash.a + ")");
        g.addColorStop(.42, wash.c + wash.a * .38 + ")");
        g.addColorStop(1, wash.c + "0)");
        ctx.fillStyle = g;
        ctx.fillRect(0, 0, W, H);
      });
      ctx.restore();
    }

    function drawNebula(p, t) {
      ctx.save();
      ctx.globalCompositeOperation = "lighter";
      const cx = W / 2;
      const cy = H * 0.48;
      for (let i = 0; i < 3; i++) {
        const radius = Math.min(W, H) * 0.32 + i * 36 + Math.sin(t * .7 + i) * 10;
        const grd = ctx.createRadialGradient(cx, cy, radius * .18, cx, cy, radius);
        const color = i === 0 ? p.glowA : i === 1 ? p.glowC : p.glowB;
        grd.addColorStop(0, color + ".00)");
        grd.addColorStop(.42, color + ".07)");
        grd.addColorStop(1, color + ".00)");
        ctx.fillStyle = grd;
        ctx.beginPath();
        ctx.ellipse(cx + Math.sin(t + i) * 22, cy + Math.cos(t * .8 + i) * 18, radius * 1.05, radius * .78, t * .12 + i, 0, Math.PI * 2);
        ctx.fill();
      }
      ctx.restore();
    }

    function pointOnRibbon(a, layer, t) {
      const cx = W / 2;
      const cy = H * 0.48;
      const baseSize = Math.min(W, H);
      const breathing = 1 + Math.sin(t * 1.08 + layer * .7) * .035;
      const rough =
        Math.sin(a * 3 + t * .85 + layer + seed) * 13 +
        Math.sin(a * 7 - t * .54 + layer * 1.9) * 8 +
        Math.sin(a * 11 + seed * .13) * 4;
      const rx = (baseSize * 0.25 + layer * 4 + rough) * breathing;
      const ry = (baseSize * 0.32 + layer * 3 + rough * .68) * breathing;
      const twist = a + Math.sin(t * .32 + layer) * .22 + layer * .025;
      return {
        x: cx + Math.cos(twist) * rx + Math.sin(a * 5 + t + layer) * 9,
        y: cy + Math.sin(twist) * ry + Math.cos(a * 4 - t * .7 + layer) * 13
      };
    }

    function drawRibbon(p, t) {
      ctx.save();
      ctx.globalCompositeOperation = "lighter";
      ctx.lineCap = "round";

      const layers = mode === 2 ? 42 : 66;
      for (let l = 0; l < layers; l++) {
        const alpha = mode === 2 ? .088 : .064;
        const hueShift = Math.sin(l * .22 + t) * .5 + .5;
        const color =
          mode === 0 && hueShift > .72 ? p.glowC :
          mode === 1 && hueShift < .34 ? p.glowA :
          p.line;
        ctx.strokeStyle = color + alpha + ")";
        ctx.lineWidth = mode === 2 ? .86 : .66;
        ctx.beginPath();
        for (let s = 0; s <= 236; s++) {
          const a = (s / 236) * Math.PI * 2 + t * .075 + l * .002;
          const pt = pointOnRibbon(a, l, t);
          if (s === 0) ctx.moveTo(pt.x, pt.y);
          else ctx.lineTo(pt.x, pt.y);
        }
        ctx.closePath();
        ctx.stroke();
      }
      ctx.restore();
    }

    function drawHighlightContours(t) {
      ctx.save();
      ctx.globalCompositeOperation = "lighter";
      ctx.lineCap = "round";
      ctx.lineJoin = "round";
      const highlightLayers = [3, 11, 19, 28, 38, 50, 62];
      highlightLayers.forEach((layer, index) => {
        const alpha = .19 - index * .014;
        ctx.strokeStyle = `rgba(255, 255, 255, ${alpha})`;
        ctx.lineWidth = index < 2 ? .82 : .58;
        ctx.shadowColor = "rgba(255, 255, 255, .45)";
        ctx.shadowBlur = index < 3 ? 7 : 4;
        ctx.beginPath();
        for (let s = 0; s <= 210; s++) {
          const u = s / 210;
          const a = u * Math.PI * 2 + t * .08 + index * .025;
          const pt = pointOnRibbon(a, layer, t * .96);
          if (s === 0) ctx.moveTo(pt.x, pt.y);
          else ctx.lineTo(pt.x, pt.y);
        }
        ctx.closePath();
        ctx.stroke();
      });
      ctx.restore();
    }

    function drawParticles(p, t) {
      ctx.save();
      ctx.globalCompositeOperation = "lighter";
      for (let i = 0; i < 72; i++) {
        const n = Math.sin(i * 91.7 + seed) * 10000;
        const xBase = (n - Math.floor(n)) * W;
        const yBase = ((Math.sin(i * 57.4 + seed * .3) * 10000) % 1 + 1) % 1 * H;
        const x = xBase + Math.sin(t * .25 + i) * 7;
        const y = (yBase + t * (2 + i % 5) * tempo) % H;
        const a = y > H * 0.15 && y < H * 0.85 ? .26 : .08;
        ctx.fillStyle = p.point + a + ")";
        ctx.beginPath();
        ctx.arc(x, y, .55 + (i % 3) * .24, 0, Math.PI * 2);
        ctx.fill();
      }
      ctx.restore();
    }

    function draw(t) {
      const p = palette();
      fillBackground(p);
      drawNebula(p, t);
      drawRibbon(p, t);
      drawHighlightContours(t);
      drawParticles(p, t);
    }

    function frame(now) {
      const delta = Math.min((now - last) / 1000, .04);
      last = now;
      if (playing) phase += delta * tempo;
      draw(phase);
      requestAnimationFrame(frame);
    }

    // 播放与暂停
    playPause.addEventListener("click", () => {
      playing = !playing;
      playPause.classList.toggle("paused", !playing);
      playPause.classList.toggle("active", playing);
      tempo = playing ? 1 : .18;

      if (playing) {
        if (!audioCtx) {
          initAudio();
        } else if (audioCtx.state === 'suspended') {
          audioCtx.resume();
        }
        if (masterGain) masterGain.gain.linearRampToValueAtTime(0.5, audioCtx.currentTime + 0.3);
      } else {
        if (masterGain) masterGain.gain.linearRampToValueAtTime(0.0, audioCtx.currentTime + 0.5);
      }
    });

    // 刷新按钮：完美连动钢琴旋律和氛围
    regenerate.addEventListener("click", () => {
      if (!audioCtx) initAudio();
      if (audioCtx && audioCtx.state === 'suspended') audioCtx.resume();

      mode = (mode + 1) % 3; 
      seed = Math.random() * 1000;
      phase += 4.2;
      
      aiText.textContent = notes[mode];
      trackName.textContent = trackNames[mode];
      
      const bpm = 58 + Math.round(Math.random() * 5);
      heartRate.textContent = `当前心率：${bpm}次/分钟`;
      
      if (playing) {
        // 切换瞬间，如果是林间清泉，直接鸣响一串华丽剔透的重叠钢琴主音
        if(mode === 0) {
          playPiano(modesAudio[mode].base * 2, 4.0, 0.08);
          setTimeout(() => playPiano(modesAudio[mode].base * 3, 3.0, 0.05), 150);
        } else {
          playNote(modesAudio[mode].base * 2, 3.5, 0.12);
        }
      }

      regenerate.animate(
        [
          { transform: "scale(1)" },
          { transform: "scale(0.88)" },
          { transform: "scale(1)" }
        ],
        { duration: 250, easing: "cubic-bezier(.25, 1, .5, 1)" }
      );
    });

    window.addEventListener("resize", () => {
      
// Mobile audio compatibility
function unlockAudio(){
  if(!audioCtx){initAudio();}
  if(audioCtx && audioCtx.state!=='running'){audioCtx.resume();}
}
['touchstart','touchend','pointerdown'].forEach(evt=>{
  window.addEventListener(evt, unlockAudio, {once:true, passive:true});
});
document.addEventListener('visibilitychange',()=>{
 if(audioCtx && document.visibilityState==='visible' && audioCtx.state==='suspended'){
   audioCtx.resume();
 }
});

    resize();
    });
    
    window.addEventListener("click", () => {
      if (playing && !audioCtx) {
        initAudio();
      }
    }, { once: true });

    resize();
    requestAnimationFrame(frame);
  </script>
