<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no, viewport-fit=cover">
  <title>Sleep Music Aurora Background</title>
  <style>
    :root {
      --text-main: rgba(255, 255, 255, .92);
      --text-soft: rgba(255, 255, 255, .68);
      --text-faint: rgba(255, 255, 255, .44);
      --line-soft: rgba(255, 255, 255, .22);
      --button: rgba(255, 255, 255, .12);
      --button-active: rgba(255, 255, 255, .23);
      font-family: "Inter", "SF Pro Display", "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", sans-serif;
    }

    * {
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
    }

    html,
    body {
      width: 100%;
      height: 100%;
      margin: 0;
      padding: 0;
      background: #010206;
      color: var(--text-main);
      overflow: hidden;
    }

    .stage {
      position: relative;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #010103;
      isolation: isolate;
    }

    canvas {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      z-index: 0;
    }

    .overlay {
      position: absolute;
      inset: 0;
      background: radial-gradient(circle at center, rgba(255,255,255,.02), transparent 60%);
      pointer-events: none;
      z-index: 1;
    }

    .vignette {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      z-index: 2;
      pointer-events: none;
      background:
        radial-gradient(circle at 50% 50%, rgba(18, 25, 42, 0), rgba(0, 0, 0, .15) 45%, rgba(0, 0, 0, .85) 95%),
        linear-gradient(180deg, rgba(0, 0, 0, .35) 0%, rgba(0, 0, 0, 0) 20%, rgba(0, 0, 0, 0) 80%, rgba(0, 0, 0, .7) 100%);
    }

    .ui {
      position: absolute;
      inset: 0;
      z-index: 3;
      pointer-events: none;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      padding-top: env(safe-area-inset-top, 0px);
      padding-bottom: env(safe-area-inset-bottom, 0px);
    }

    .ui-top {
      width: 100%;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    .status-bar {
      width: 100%;
      height: 44px;
      display: grid;
      grid-template-columns: 1fr auto 1fr;
      align-items: center;
      padding: 0 24px;
      font-size: 14px;
      font-weight: 600;
      color: rgba(255, 255, 255, .84);
    }

    .status-icons {
      justify-self: end;
      display: flex;
      align-items: center;
      gap: 5px;
      opacity: .86;
    }

    .signal { display: grid; grid-template-columns: repeat(4, 3px); gap: 2px; align-items: end; height: 11px; }
    .signal span { display: block; width: 3px; border-radius: 3px; background: currentColor; }
    .signal span:nth-child(1) { height: 4px; }
    .signal span:nth-child(2) { height: 6px; }
    .signal span:nth-child(3) { height: 8px; }
    .signal span:nth-child(4) { height: 10px; }

    .wifi { width: 15px; height: 11px; position: relative; overflow: hidden; }
    .wifi::before, .wifi::after {
      content: ""; position: absolute; left: 50%; bottom: -7px; transform: translateX(-50%);
      border: 2px solid currentColor; border-color: currentColor transparent transparent transparent; border-radius: 999px;
    }
    .wifi::before { width: 18px; height: 18px; }
    .wifi::after { width: 10px; height: 10px; bottom: -3px; }

    .battery { width: 23px; height: 11px; border: 1.4px solid currentColor; border-radius: 3px; position: relative; }
    .battery::before { content: ""; position: absolute; right: 2px; top: 2px; bottom: 2px; left: 2px; border-radius: 1.5px; background: currentColor; }
    .battery::after { content: ""; position: absolute; right: -3px; top: 3px; width: 2px; height: 5px; border-radius: 0 2px 2px 0; background: currentColor; }

    .hero {
      margin-top: 40px;
      width: 100%;
      max-width: 340px;
      text-align: center;
      display: flex;
      flex-direction: column;
      align-items: center;
      pointer-events: auto;
      position: relative;
    }

    h1 {
      margin: 0;
      font-size: 32px;
      line-height: 1.2;
      font-weight: 500;
      color: var(--text-main);
      text-shadow: 0 0 22px rgba(255, 255, 255, .08);
    }

    .hero::before {
      content: "";
      position: absolute;
      left: 50%;
      top: 50%;
      width: 220px;
      height: 220px;
      transform: translate(-50%, -50%);
      border-radius: 50%;
      background: radial-gradient(circle, rgba(0, 0, 0, .35), rgba(0, 0, 0, 0) 70%);
      z-index: -1;
      pointer-events: none;
    }

    .ai-note {
      margin-top: 16px;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      color: var(--text-soft);
      font-size: 13px;
      white-space: nowrap;
    }

    .typing-mark {
      width: 14px;
      height: 14px;
      border-radius: 50%;
      border: 1px solid rgba(255, 255, 255, .46);
      position: relative;
    }
    .typing-mark::before {
      content: ""; position: absolute; inset: 3px; border-radius: 50%;
      background: rgba(255, 255, 255, .72); animation: breathe 3.2s ease-in-out infinite;
    }

    .heart-rate {
      margin-top: 14px;
      color: var(--text-faint);
      font-size: 12px;
    }

    .ui-bottom {
      width: 100%;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding-bottom: 8px;
    }

    .status-panel {
      width: calc(100% - 48px);
      max-width: 354px;
      margin-bottom: 24px;
      color: var(--text-soft);
      font-size: 12px;
      pointer-events: auto;
      text-shadow: 0 1px 12px rgba(0, 0, 0, .5);
    }

    .status-top, .metrics {
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .status-top {
      color: rgba(255, 255, 255, .74);
      margin-bottom: 12px;
    }

    .status-title { font-size: 14px; font-weight: 500; }
    .weather { color: rgba(255, 255, 255, .58); }
    .metrics { color: rgba(255, 255, 255, .48); }

    .metric { flex: 1; text-align: center; }
    .metric:first-child { text-align: left; }
    .metric:last-child { text-align: right; }

    .divider { width: 1px; height: 12px; background: var(--line-soft); }

    .player {
      width: calc(100% - 48px);
      max-width: 354px;
      height: 44px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      pointer-events: auto;
      text-shadow: 0 1px 12px rgba(0, 0, 0, .5);
      margin-bottom: 12px;
    }

    .track { display: flex; align-items: center; gap: 12px; color: rgba(255, 255, 255, .78); }

    .agent {
      width: 38px;
      height: 38px;
      position: relative;
      display: grid;
      place-items: center;
      isolation: isolate;
    }

    .agent::before {
      content: "";
      position: absolute;
      width: 26px;
      height: 26px;
      border-radius: 50%;
      background: 
        radial-gradient(circle at 30% 25%, rgba(255, 255, 255, 0.98) 0%, rgba(255, 255, 255, 0) 25%), 
        radial-gradient(circle at 50% 30%, #a4e1ff 0%, #6353ff 55%, #1d1066 100%); 
      box-shadow: 
        0 4px 14px rgba(99, 83, 255, 0.6),            
        inset -3px -3px 7px rgba(0, 0, 0, 0.6),        
        inset 2px 2px 5px rgba(255, 255, 255, 0.4);   
      animation: sphereGlow 4s ease-in-out infinite alternate;
      z-index: 2;
    }

    .agent::after {
      content: "";
      position: absolute;
      width: 36px;
      height: 36px;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(144, 124, 255, 0.4) 0%, rgba(0, 242, 254, 0.1) 50%, transparent 75%);
      border: 1px solid rgba(255, 255, 255, 0.15);
      box-shadow: 
        0 0 16px rgba(0, 242, 254, 0.35),
        inset 0 0 8px rgba(144, 124, 255, 0.2);
      animation: orbitRotate 6s linear infinite;
      z-index: 1;
    }

    .agent-shadow {
      position: absolute;
      width: 30px;
      height: 30px;
      border-radius: 50%;
      background: #ff7bf3;
      mix-blend-mode: screen;
      filter: blur(4px);
      opacity: 0.55;
      animation: shadowShift 3.5s ease-in-out infinite alternate;
      z-index: 0;
    }

    .track-name { font-size: 16px; font-weight: 400; white-space: nowrap; }
    .controls { width: 104px; display: flex; justify-content: space-between; }

    .round-control {
      width: 44px;
      height: 44px;
      border: 0;
      border-radius: 50%;
      color: rgba(255, 255, 255, .88);
      background: var(--button);
      box-shadow: inset 0 0 0 1px rgba(255, 255, 255, .16);
      display: grid;
      place-items: center; /* 确保子元素在圆形背景中严格对齐 */
      cursor: pointer;
      transition: transform .25s ease, background .25s ease, box-shadow .25s ease;
    }
    .round-control:hover, .round-control.active {
      background: var(--button-active);
      box-shadow: inset 0 0 0 1px rgba(255, 255, 255, .24), 0 0 22px rgba(255, 255, 255, .08);
    }
    .round-control:active { transform: scale(.94); }

    .play-icon { width: 18px; height: 18px; position: relative; }
    .play-icon::before, .play-icon::after {
      content: ""; position: absolute; top: 1px; width: 5px; height: 16px; border-radius: 2px;
      background: currentColor; transition: all .2s ease;
    }
    .play-icon::before { left: 3px; }
    .play-icon::after { right: 3px; }

    .paused .play-icon::before {
      left: 5px; top: 2px; width: 0; height: 0;
      border-top: 7px solid transparent; border-bottom: 7px solid transparent; border-left: 11px solid currentColor;
      background: transparent; border-radius: 0;
    }
    .paused .play-icon::after { opacity: 0; transform: translateX(5px); }

    /* 优化：放大星芒按钮，并实现几何绝对中心对齐 */
    .sparkle-icon {
      width: 100%;
      height: 100%;
      position: relative;
      display: grid;
      place-items: center; /* 让文字图形在物理边界内精密对齐 */
    }
    /* 主体大星芒：完美居中摆放 */
    .sparkle-icon::before {
      content: "✦";
      font-size: 23px; /* 显著加大星芒尺寸（原先为16px） */
      line-height: 1;
      color: currentColor;
      display: block;
      transform: translate(0px, -1px); /* 微调视觉多边缘平衡 */
    }
    /* 伴随的辅助小星芒 */
    .sparkle-icon::after {
      content: "✦";
      position: absolute;
      right: 8px;
      top: 8px;
      font-size: 10px;
      line-height: 1;
      color: currentColor;
      opacity: 0.85;
    }

    .ai-label { width: 100%; color: rgba(255, 255, 255, .34); font-size: 11px; text-align: center; pointer-events: none; margin-bottom: 4px; }
    .home-indicator { width: 100%; height: 12px; display: grid; place-items: center; pointer-events: none; }
    .home-indicator::before { content: ""; width: 134px; height: 5px; border-radius: 99px; background: rgba(255, 255, 255, .4); }

    @keyframes breathe { 0%, 100% { transform: scale(.72); opacity: .46; } 50% { transform: scale(1.08); opacity: .96; } }
    @keyframes sphereGlow { 0% { transform: scale(0.96) rotate(0deg); filter: hue-rotate(0deg) brightness(1); } 100% { transform: scale(1.05) rotate(15deg); filter: hue-rotate(15deg) brightness(1.1); } }
    @keyframes orbitRotate { 0% { transform: rotate3d(1, 1, 1, 0deg); } 100% { transform: rotate3d(1, 1, 1, 360deg); } }
    @keyframes shadowShift { 0% { transform: translate(-2px, -1px) scale(0.9); opacity: 0.4; } 100% { transform: translate(3px, 2px) scale(1.15); opacity: 0.65; } }
  </style>
</head>
<body>
  <main class="stage" aria-label="助眠音乐动态背景界面">
    <canvas id="field" aria-hidden="true"></canvas>
    <div class="overlay"></div>
    <div class="vignette" aria-hidden="true"></div>
    
    <section class="ui">
      <div class="ui-top">
        <div class="status-bar">
          <span>9:41</span>
          <span></span>
          <span class="status-icons" aria-hidden="true">
            <span class="signal"><span></span><span></span><span></span><span></span></span>
            <span class="wifi"></span>
            <span class="battery"></span>
          </span>
        </div>

        <div class="hero">
          <h1>助眠</h1>
          <div class="ai-note">
            <span class="typing-mark" aria-hidden="true"></span>
            <span id="aiText">日间压力相比往常偏大，AI已增强G大调与海浪声</span>
          </div>
          <div class="heart-rate" id="heartRate">当前心率：60次/分钟</div>
        </div>
      </div>

      <div class="ui-bottom">
        <div class="status-panel" aria-label="今日状态">
          <div class="status-top">
            <span class="status-title">今日状态</span>
            <span class="weather">23°C / 阴</span>
          </div>
          <div class="metrics">
            <span class="metric">压力均值：44</span>
            <span class="divider" aria-hidden="true"></span>
            <span class="metric">愉悦占比：25%</span>
            <span class="divider" aria-hidden="true"></span>
            <span class="metric">HRV均值：36ms</span>
          </div>
        </div>

        <div class="player" aria-label="音乐播放器">
          <div class="track">
            <span class="agent" aria-hidden="true">
              <span class="agent-shadow"></span>
            </span>
            <span class="track-name">月下沉静</span>
          </div>
          <div class="controls">
            <button id="playPause" class="round-control active" type="button" aria-label="暂停">
              <span class="play-icon" aria-hidden="true"></span>
            </button>
            <button id="regenerate" class="round-control" type="button" aria-label="AI智能切换色彩与乐曲">
              <span class="sparkle-icon" aria-hidden="true"></span>
            </button>
          </div>
        </div>

        <div class="ai-label">本音乐由AI生成</div>
        <div class="home-indicator" aria-hidden="true"></div>
      </div>
    </section>
  </main>

  <script>
    const canvas = document.getElementById("field");
    const ctx = canvas.getContext("2d");
    const playPause = document.getElementById("playPause");
    const regenerate = document.getElementById("regenerate");
    const aiText = document.getElementById("aiText");
    const heartRate = document.getElementById("heartRate");

    let viewW = window.innerWidth;
    let viewH = window.innerHeight;
    let dpr = Math.min(window.devicePixelRatio || 1, 2);
    let playing = true;
    let seed = Math.random() * 1000;
    let tempo = 2.0; 
    let last = performance.now();
    let phase = 0;

    // 核心矩阵：多套高对比度不同色系的渐变色彩定义
    const themes = [
      {
        bg: "#010206",
        blobs: ["rgba(0,255,180,ALPHA)", "rgba(0,140,255,ALPHA)", "rgba(180,0,255,ALPHA)"] // 幻翠幽紫
      },
      {
        bg: "#070101",
        blobs: ["rgba(255,60,0,ALPHA)", "rgba(255,0,110,ALPHA)", "rgba(130,0,255,ALPHA)"]  // 烈焰极光
      },
      {
        bg: "#010606",
        blobs: ["rgba(0,242,254,ALPHA)", "rgba(255,0,240,ALPHA)", "rgba(10,30,180,ALPHA)"]  // 赛博霓虹
      },
      {
        bg: "#020405",
        blobs: ["rgba(50,255,240,ALPHA)", "rgba(255,220,60,ALPHA)", "rgba(0,110,255,ALPHA)"] // 冰川晨曦
      }
    ];
    let currentThemeIdx = 0;

    let blobConfigs = [];
    function generateBlobConfigs() {
      blobConfigs = [];
      const currentColors = themes[currentThemeIdx].blobs;

      // 组1
      for(let i=0; i<6; i++) {
        blobConfigs.push({
          xPct: 0.05 + (i * 0.18) + (Math.sin(i * 12.3 + seed) * 0.1),
          yPct: 0.2 + (Math.cos(i * 7.4 + seed) * 0.15),
          radiusScale: 0.55 + (Math.abs(Math.sin(i * 3.3 + seed)) * 0.25),
          ampX: 0.24 + (Math.abs(Math.cos(i * 2.1 + seed)) * 0.2),
          ampY: 0.14 + (Math.abs(Math.sin(i * 8.5 + seed)) * 0.12),
          speedX: 0.70 + (i * 0.10),
          speedY: 0.50 + (i * 0.08),
          color: currentColors[0],
          baseAlpha: 0.24
        });
      }
      // 组2
      for(let i=0; i<5; i++) {
        blobConfigs.push({
          xPct: 0.1 + (i * 0.2) + (Math.cos(i * 15.4 + seed) * 0.12),
          yPct: 0.5 + (Math.sin(i * 9.1 + seed) * 0.18),
          radiusScale: 0.5 + (Math.abs(Math.cos(i * 4.2 + seed)) * 0.25),
          ampX: 0.26 + (Math.abs(Math.sin(i * 5.1 + seed)) * 0.18),
          ampY: 0.16 + (Math.abs(Math.cos(i * 1.1 + seed)) * 0.12),
          speedX: 0.56 + (i * 0.12),
          speedY: 0.64 + (i * 0.06),
          color: currentColors[1],
          baseAlpha: 0.20
        });
      }
      // 组3
      for(let i=0; i<4; i++) {
        blobConfigs.push({
          xPct: 0.15 + (i * 0.22) + (Math.sin(i * 8.8 + seed) * 0.1),
          yPct: 0.7 + (Math.cos(i * 13.2 + seed) * 0.15),
          radiusScale: 0.45 + (Math.abs(Math.sin(i * 6.5 + seed)) * 0.2),
          ampX: 0.22 + (Math.abs(Math.cos(i * 3.7 + seed)) * 0.2),
          ampY: 0.12 + (Math.abs(Math.sin(i * 4.9 + seed)) * 0.14),
          speedX: 0.80 + (i * 0.08),
          speedY: 0.70 + (i * 0.10),
          color: currentColors[2],
          baseAlpha: 0.16
        });
      }
    }

    const notes = [
      "日间压力相比往常偏大，AI已增强G大调与海浪声",
      "当前状态平衡，声音顺着节奏自然展开",
      "夜间心率趋稳，AI正在降低泛音亮度"
    ];

    function resize() {
      viewW = window.innerWidth;
      viewH = window.innerHeight;
      dpr = Math.min(window.devicePixelRatio || 1, 2);
      canvas.width = viewW * dpr;
      canvas.height = viewH * dpr;
      ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
    }

    function blob(x, y, r, c, a) {
      const g = ctx.createRadialGradient(x, y, 0, x, y, r);
      g.addColorStop(0, c.replace("ALPHA", a));
      g.addColorStop(1, c.replace("ALPHA", "0"));
      ctx.fillStyle = g;
      ctx.beginPath();
      ctx.arc(x, y, r, 0, Math.PI * 2);
      ctx.fill();
    }

    function drawAuroraBackground(t) {
      ctx.fillStyle = themes[currentThemeIdx].bg; // 随色系动态变更暗色底盘
      ctx.fillRect(0, 0, viewW, viewH);

      ctx.globalCompositeOperation = "lighter";

      blobConfigs.forEach((b, idx) => {
        const x = viewW * b.xPct + Math.sin(t * b.speedX + idx) * (viewW * b.ampX);
        const y = viewH * b.yPct + Math.cos(t * b.speedY + idx * 1.5) * (viewH * b.ampY);
        const r = viewW * b.radiusScale;
        blob(x, y, r, b.color, b.baseAlpha);
      });

      ctx.globalCompositeOperation = "source-over";
    }

    function drawParticles(t) {
      ctx.save();
      ctx.globalCompositeOperation = "lighter";
      for (let i = 0; i < 45; i++) {
        const n = Math.sin(i * 91.7 + seed) * 10000;
        const xBase = (n - Math.floor(n)) * viewW;
        const yBase = ((Math.sin(i * 57.4 + seed * .3) * 10000) % 1 + 1) % 1 * viewH;
        const x = xBase + Math.sin(t * .25 + i) * 7;
        const y = (yBase + t * (4 + i % 5) * tempo) % viewH; 
        const a = y > 140 && y < viewH - 140 ? .22 : .06;
        ctx.fillStyle = "rgba(255, 255, 255, " + a + ")";
        ctx.beginPath();
        ctx.arc(x, y, .5 + (i % 3) * 0.18, 0, Math.PI * 2);
        ctx.fill();
      }
      ctx.restore();
    }

    function draw(t) {
      drawAuroraBackground(t);
      drawParticles(t);
    }

    function frame(now) {
      const delta = Math.min((now - last) / 1000, .04);
      last = now;
      if (playing) phase += delta * tempo;
      draw(phase);
      requestAnimationFrame(frame);
    }

    playPause.addEventListener("click", () => {
      playing = !playing;
      playPause.classList.toggle("paused", !playing);
      playPause.classList.toggle("active", playing);
      playPause.setAttribute("aria-label", playing ? "暂停" : "播放");
      tempo = playing ? 2.0 : .36; 
    });

    // 核心重构：点击星芒按钮切换不同色系的渐变色
    regenerate.addEventListener("click", () => {
      // 切换到下一个色系主题
      currentThemeIdx = (currentThemeIdx + 1) % themes.length;
      
      seed = Math.random() * 1000;
      generateBlobConfigs(); // 注入新色系渐变矩阵并重新打散运动
      phase += 3.5;

      const next = (notes.indexOf(aiText.textContent) + 1) % notes.length;
      aiText.textContent = notes[next];
      const bpm = 58 + Math.round(Math.random() * 5);
      heartRate.textContent = `当前心率：${bpm}次/分钟`;
      
      // 给大星芒赋予弹性震荡回馈动画
      regenerate.animate(
        [
          { transform: "scale(1)", filter: "brightness(1)" },
          { transform: "scale(0.82) rotate(18deg)", filter: "brightness(1.6)" },
          { transform: "scale(1.15) rotate(-12deg)" },
          { transform: "scale(1)", filter: "brightness(1)" }
        ],
        { duration: 600, easing: "cubic-bezier(.22,1,.36,1)" }
      );
    });

    generateBlobConfigs();
    window.addEventListener("resize", resize);
    resize();
    requestAnimationFrame(frame);
  </script>
</body>
</html>
