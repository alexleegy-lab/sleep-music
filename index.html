<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Sleep Music Abstract Background</title>
  <style>
    :root {
      --screen-w: 402px;
      --screen-h: 874px;
      --stage-w: min(var(--screen-w), 100vw, calc(100vh * 402 / 874));
      --stage-scale: 1;
      --text-main: rgba(255, 255, 255, .92);
      --text-soft: rgba(255, 255, 255, .68);
      --text-faint: rgba(255, 255, 255, .44);
      --line-soft: rgba(255, 255, 255, .22);
      --button: rgba(255, 255, 255, .12);
      --button-active: rgba(255, 255, 255, .23);
      font-family: "Inter", "SF Pro Display", "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", sans-serif;
    }

    * {
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
    }

    html,
    body {
      width: 100%;
      height: 100%;
      margin: 0;
      background: #050506;
      color: var(--text-main);
      overflow: hidden;
    }

    body {
      display: grid;
      place-items: center;
    }

    .stage {
      position: relative;
      width: var(--stage-w);
      height: calc(var(--stage-w) * 874 / 402);
      aspect-ratio: 402 / 874;
      overflow: hidden;
      background: #020203;
      isolation: isolate;
    }

    canvas {
      position: absolute;
      inset: 0;
      width: var(--screen-w);
      height: var(--screen-h);
      transform: scale(var(--stage-scale));
      transform-origin: top left;
      z-index: 0;
    }

    .vignette {
      position: absolute;
      inset: 0;
      width: var(--screen-w);
      height: var(--screen-h);
      transform: scale(var(--stage-scale));
      transform-origin: top left;
      z-index: 1;
      pointer-events: none;
      background:
        radial-gradient(circle at 50% 41%, rgba(18, 25, 42, .02), rgba(0, 0, 0, .18) 36%, rgba(0, 0, 0, .74) 82%),
        linear-gradient(180deg, rgba(0, 0, 0, .38) 0%, rgba(0, 0, 0, .04) 32%, rgba(0, 0, 0, .2) 68%, rgba(0, 0, 0, .64) 100%);
    }

    .ui {
      position: absolute;
      inset: 0;
      width: var(--screen-w);
      height: var(--screen-h);
      transform: scale(var(--stage-scale));
      transform-origin: top left;
      z-index: 2;
      pointer-events: none;
    }

    .status-bar {
      position: absolute;
      left: 0;
      top: 0;
      width: 100%;
      height: 44px;
      display: grid;
      grid-template-columns: 1fr auto 1fr;
      align-items: center;
      padding: 13px 26px 0;
      font-size: 14px;
      font-weight: 600;
      letter-spacing: 0;
      color: rgba(255, 255, 255, .84);
    }

    .status-icons {
      justify-self: end;
      display: flex;
      align-items: center;
      gap: 5px;
      opacity: .86;
    }

    .signal {
      display: grid;
      grid-template-columns: repeat(4, 3px);
      gap: 2px;
      align-items: end;
      height: 11px;
    }

    .signal span {
      display: block;
      width: 3px;
      border-radius: 3px;
      background: currentColor;
    }

    .signal span:nth-child(1) { height: 4px; }
    .signal span:nth-child(2) { height: 6px; }
    .signal span:nth-child(3) { height: 8px; }
    .signal span:nth-child(4) { height: 10px; }

    .wifi {
      width: 15px;
      height: 11px;
      position: relative;
      overflow: hidden;
    }

    .wifi::before,
    .wifi::after {
      content: "";
      position: absolute;
      left: 50%;
      bottom: -7px;
      transform: translateX(-50%);
      border: 2px solid currentColor;
      border-color: currentColor transparent transparent transparent;
      border-radius: 999px;
    }

    .wifi::before {
      width: 18px;
      height: 18px;
    }

    .wifi::after {
      width: 10px;
      height: 10px;
      bottom: -3px;
    }

    .battery {
      width: 23px;
      height: 11px;
      border: 1.4px solid currentColor;
      border-radius: 3px;
      position: relative;
    }

    .battery::before {
      content: "";
      position: absolute;
      right: 2px;
      top: 2px;
      bottom: 2px;
      left: 2px;
      border-radius: 1.5px;
      background: currentColor;
    }

    .battery::after {
      content: "";
      position: absolute;
      right: -3px;
      top: 3px;
      width: 2px;
      height: 5px;
      border-radius: 0 2px 2px 0;
      background: currentColor;
    }

    .play-icon,
    .reset-icon {
      position: relative;
      display: block;
    }

    .hero {
      position: absolute;
      left: 37px;
      top: 184px;
      width: 328px;
      height: 104px;
      text-align: center;
      display: flex;
      flex-direction: column;
      align-items: center;
      pointer-events: auto;
    }

    h1 {
      margin: 0;
      height: 32px;
      font-size: 32px;
      line-height: 32px;
      font-weight: 500;
      color: var(--text-main);
      letter-spacing: 0;
      text-shadow: 0 0 22px rgba(255, 255, 255, .08);
    }

    .hero::before {
      content: "";
      position: absolute;
      left: 50%;
      top: -34px;
      width: 188px;
      height: 188px;
      transform: translateX(-50%);
      border-radius: 50%;
      background: radial-gradient(circle, rgba(0, 0, 0, .22), rgba(0, 0, 0, 0) 70%);
      z-index: -1;
      pointer-events: none;
    }

    .ai-note {
      position: absolute;
      left: 0;
      top: 48px;
      width: 328px;
      height: 16px;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      color: var(--text-soft);
      font-size: 12px;
      line-height: 14px;
      white-space: nowrap;
    }

    .typing-mark {
      width: 16px;
      height: 16px;
      border-radius: 50%;
      border: 1px solid rgba(255, 255, 255, .46);
      position: relative;
      box-shadow: 0 0 18px rgba(255, 244, 177, .18);
    }

    .typing-mark::before {
      content: "";
      position: absolute;
      inset: 4px;
      border-radius: 50%;
      background: rgba(255, 255, 255, .72);
      animation: breathe 3.2s ease-in-out infinite;
    }

    .heart-rate {
      position: absolute;
      left: 106.5px;
      top: 80px;
      width: 115px;
      height: 12px;
      color: var(--text-faint);
      font-size: 12px;
      line-height: 12px;
    }

    .status-panel {
      position: absolute;
      left: 40px;
      top: 684px;
      width: 330px;
      height: 46px;
      color: var(--text-soft);
      font-size: 12px;
      line-height: 14px;
      pointer-events: auto;
      text-shadow: 0 1px 10px rgba(0, 0, 0, .35);
    }

    .status-top,
    .metrics {
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .status-top {
      height: 14px;
      color: rgba(255, 255, 255, .74);
    }

    .status-title {
      width: 56px;
      text-align: left;
      font-size: 14px;
      line-height: 14px;
    }

    .weather {
      font-size: 12px;
      color: rgba(255, 255, 255, .58);
    }

    .metrics {
      position: absolute;
      left: 0;
      top: 34px;
      width: 330px;
      height: 12px;
      color: rgba(255, 255, 255, .48);
      font-size: 12px;
      line-height: 12px;
    }

    .metric {
      width: 100px;
      white-space: nowrap;
    }

    .divider {
      width: 1px;
      height: 12px;
      background: var(--line-soft);
    }

    .player {
      position: absolute;
      left: 24px;
      top: 762px;
      width: 354px;
      height: 44px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      pointer-events: auto;
      text-shadow: 0 1px 10px rgba(0, 0, 0, .35);
    }

    .track {
      width: 124px;
      height: 44px;
      display: flex;
      align-items: center;
      gap: 8px;
      color: rgba(255, 255, 255, .78);
    }

    .agent {
      width: 44px;
      height: 44px;
      display: grid;
      place-items: center;
      position: relative;
      flex: 0 0 auto;
    }

    .agent::before {
      content: "";
      width: 26px;
      height: 26px;
      border-radius: 50%;
      background:
        radial-gradient(circle at 31% 28%, rgba(255, 255, 255, .95) 0 1.8px, transparent 2px),
        radial-gradient(circle at 68% 34%, rgba(202, 221, 255, .9) 0 1.6px, transparent 1.9px),
        radial-gradient(circle at 52% 70%, rgba(190, 145, 255, .78) 0 2.2px, transparent 2.6px),
        radial-gradient(circle at 35% 35%, rgba(154, 211, 255, .95), rgba(105, 86, 255, .56) 34%, rgba(177, 75, 255, .34) 62%, rgba(255, 255, 255, .08));
      border: 1px solid rgba(221, 231, 255, .34);
      box-shadow:
        0 0 15px rgba(92, 146, 255, .34),
        0 0 28px rgba(141, 85, 255, .22),
        inset 0 0 12px rgba(255, 255, 255, .18);
      animation: aiThink 2.8s ease-in-out infinite;
    }

    .agent::after {
      content: "";
      position: absolute;
      width: 36px;
      height: 36px;
      border-radius: 50%;
      border: 1px solid rgba(177, 211, 255, .22);
      box-shadow:
        0 0 0 6px rgba(110, 123, 255, .045),
        0 0 18px rgba(119, 102, 255, .2);
      animation: aiOrbit 2.8s ease-in-out infinite;
    }

    .track-name {
      font-size: 16px;
      line-height: 16px;
      font-weight: 400;
      letter-spacing: 0;
      white-space: nowrap;
    }

    .controls {
      width: 104px;
      height: 44px;
      display: flex;
      justify-content: space-between;
    }

    .round-control {
      width: 44px;
      height: 44px;
      border: 0;
      border-radius: 50%;
      color: rgba(255, 255, 255, .88);
      background: var(--button);
      box-shadow: inset 0 0 0 1px rgba(255, 255, 255, .16);
      display: grid;
      place-items: center;
      cursor: pointer;
      transition: transform .25s ease, background .25s ease, box-shadow .25s ease;
    }

    .round-control:hover,
    .round-control.active {
      background: var(--button-active);
      box-shadow: inset 0 0 0 1px rgba(255, 255, 255, .24), 0 0 22px rgba(255, 255, 255, .08);
    }

    .round-control:active {
      transform: scale(.94);
    }

    .play-icon {
      width: 18px;
      height: 18px;
    }

    .play-icon::before,
    .play-icon::after {
      content: "";
      position: absolute;
      top: 1px;
      width: 5px;
      height: 16px;
      border-radius: 2px;
      background: currentColor;
      transition: all .2s ease;
    }

    .play-icon::before {
      left: 3px;
    }

    .play-icon::after {
      right: 3px;
    }

    .paused .play-icon::before {
      left: 5px;
      top: 2px;
      width: 0;
      height: 0;
      border-top: 7px solid transparent;
      border-bottom: 7px solid transparent;
      border-left: 11px solid currentColor;
      background: transparent;
      border-radius: 0;
    }

    .paused .play-icon::after {
      opacity: 0;
      transform: translateX(5px);
    }

    .reset-icon {
      width: 20px;
      height: 20px;
      border: 1.7px solid currentColor;
      border-right-color: transparent;
      border-radius: 50%;
      transform: rotate(-35deg);
    }

    .reset-icon::after {
      content: "";
      position: absolute;
      right: 0;
      top: 0;
      width: 6px;
      height: 6px;
      border-top: 1.7px solid currentColor;
      border-right: 1.7px solid currentColor;
      transform: rotate(34deg);
    }

    .ai-label {
      position: absolute;
      left: 159px;
      top: 834px;
      width: 84px;
      height: 12px;
      color: rgba(255, 255, 255, .34);
      font-size: 12px;
      line-height: 12px;
      text-align: center;
      pointer-events: none;
    }

    .home-indicator {
      position: absolute;
      left: 0;
      top: 840px;
      width: 402px;
      height: 34px;
      display: grid;
      place-items: center;
      pointer-events: none;
    }

    .home-indicator::before {
      content: "";
      width: 134px;
      height: 5px;
      border-radius: 99px;
      background: rgba(255, 255, 255, .68);
    }

    .sr-only {
      position: absolute;
      width: 1px;
      height: 1px;
      padding: 0;
      margin: -1px;
      overflow: hidden;
      clip: rect(0, 0, 0, 0);
      white-space: nowrap;
      border: 0;
    }

    @keyframes breathe {
      0%,
      100% {
        transform: scale(.72);
        opacity: .46;
      }
      50% {
        transform: scale(1.08);
        opacity: .96;
      }
    }

    @keyframes aiThink {
      0%,
      100% {
        transform: scale(.92) rotate(0deg);
        filter: saturate(1.05);
      }
      45% {
        transform: scale(1.07) rotate(12deg);
        filter: saturate(1.35);
      }
      70% {
        transform: scale(.98) rotate(24deg);
      }
    }

    @keyframes aiOrbit {
      0%,
      100% {
        transform: scale(.82);
        opacity: .36;
      }
      50% {
        transform: scale(1.05);
        opacity: .78;
      }
    }

  </style>
</head>
<body>
  <main class="stage" aria-label="助眠音乐动态背景界面">
    <canvas id="field" aria-hidden="true"></canvas>
    <div class="vignette" aria-hidden="true"></div>
    <section class="ui">
      <div class="status-bar">
        <span>9:41</span>
        <span></span>
        <span class="status-icons" aria-hidden="true">
          <span class="signal"><span></span><span></span><span></span><span></span></span>
          <span class="wifi"></span>
          <span class="battery"></span>
        </span>
      </div>

      <div class="hero">
        <h1>助眠</h1>
        <div class="ai-note">
          <span class="typing-mark" aria-hidden="true"></span>
          <span id="aiText">日间压力相比往常偏大，AI已增强G大调与海浪声</span>
        </div>
        <div class="heart-rate" id="heartRate">当前心率：60次/分钟</div>
      </div>

      <div class="status-panel" aria-label="今日状态">
        <div class="status-top">
          <span class="status-title">今日状态</span>
          <span class="weather">23°C / 阴</span>
        </div>
        <div class="metrics">
          <span class="metric">压力均值：44</span>
          <span class="divider" aria-hidden="true"></span>
          <span class="metric">愉悦占比：25%</span>
          <span class="divider" aria-hidden="true"></span>
          <span class="metric">HRV均值：36ms</span>
        </div>
      </div>

      <div class="player" aria-label="音乐播放器">
        <div class="track">
          <span class="agent" aria-hidden="true"></span>
          <span class="track-name">月下沉静</span>
        </div>
        <div class="controls">
          <button id="playPause" class="round-control active" type="button" aria-label="暂停">
            <span class="play-icon" aria-hidden="true"></span>
          </button>
          <button id="regenerate" class="round-control" type="button" aria-label="重新生成音乐">
            <span class="reset-icon" aria-hidden="true"></span>
          </button>
        </div>
      </div>

      <div class="ai-label">本音乐由AI生成</div>
      <div class="home-indicator" aria-hidden="true"></div>
    </section>
  </main>

  <script>
    const canvas = document.getElementById("field");
    const ctx = canvas.getContext("2d");
    const playPause = document.getElementById("playPause");
    const regenerate = document.getElementById("regenerate");
    const aiText = document.getElementById("aiText");
    const heartRate = document.getElementById("heartRate");

    const W = 402;
    const H = 874;
    let dpr = Math.min(window.devicePixelRatio || 1, 2);
    let playing = true;
    let mode = 0;
    let seed = Math.random() * 1000;
    let tempo = 1;
    let last = performance.now();
    let phase = 0;

    const notes = [
      "日间压力相比往常偏大，AI已增强G大调与海浪声",
      "当前状态平衡，声音顺着节奏自然展开",
      "夜间心率趋稳，AI正在降低泛音亮度"
    ];

    function resize() {
      const scale = Math.min(1, window.innerWidth / W, window.innerHeight / H);
      document.documentElement.style.setProperty("--stage-w", `${W * scale}px`);
      document.documentElement.style.setProperty("--stage-scale", scale);
      const rect = canvas.getBoundingClientRect();
      dpr = Math.min(window.devicePixelRatio || 1, 2);
      canvas.width = Math.round(rect.width * dpr);
      canvas.height = Math.round(rect.height * dpr);
      ctx.setTransform(canvas.width / W, 0, 0, canvas.height / H, 0, 0);
    }

    function palette() {
      if (mode === 1) {
        return {
          glowA: "rgba(142, 82, 255, ",
          glowB: "rgba(78, 96, 255, ",
          glowC: "rgba(214, 74, 255, ",
          line: "rgba(235, 230, 255, ",
          point: "rgba(255, 255, 255, "
        };
      }
      if (mode === 2) {
        return {
          glowA: "rgba(126, 96, 255, ",
          glowB: "rgba(196, 85, 255, ",
          glowC: "rgba(88, 145, 255, ",
          line: "rgba(246, 242, 255, ",
          point: "rgba(255, 255, 255, "
        };
      }
      return {
        glowA: "rgba(128, 88, 255, ",
        glowB: "rgba(198, 76, 255, ",
        glowC: "rgba(77, 119, 255, ",
        line: "rgba(238, 234, 255, ",
        point: "rgba(255, 255, 255, "
      };
    }

    function fillBackground(p) {
      const base = ctx.createLinearGradient(0, 0, W, H);
      base.addColorStop(0, "#050018");
      base.addColorStop(.24, "#170844");
      base.addColorStop(.52, "#21083c");
      base.addColorStop(.78, "#120022");
      base.addColorStop(1, "#03000a");
      ctx.fillStyle = base;
      ctx.fillRect(0, 0, W, H);

      ctx.save();
      ctx.globalCompositeOperation = "screen";
      const washes = [
        { x: W * (.18 + Math.sin(phase * .18) * .08), y: H * .18, r: 300, c: p.glowB, a: .36 },
        { x: W * (.86 + Math.cos(phase * .14) * .06), y: H * .34, r: 320, c: p.glowA, a: .3 },
        { x: W * (.34 + Math.sin(phase * .11 + 2) * .08), y: H * .82, r: 340, c: p.glowB, a: .28 },
        { x: W * (.72 + Math.cos(phase * .16 + 1) * .08), y: H * .72, r: 300, c: p.glowC, a: .22 }
      ];
      washes.forEach((wash) => {
        const g = ctx.createRadialGradient(wash.x, wash.y, 0, wash.x, wash.y, wash.r);
        g.addColorStop(0, wash.c + wash.a + ")");
        g.addColorStop(.42, wash.c + wash.a * .38 + ")");
        g.addColorStop(1, wash.c + "0)");
        ctx.fillStyle = g;
        ctx.fillRect(0, 0, W, H);
      });
      ctx.restore();

      const fade = ctx.createLinearGradient(0, 0, 0, H);
      fade.addColorStop(0, "rgba(0,0,0,.26)");
      fade.addColorStop(.36, "rgba(0,0,0,.04)");
      fade.addColorStop(.72, "rgba(0,0,0,.14)");
      fade.addColorStop(1, "rgba(0,0,0,.62)");
      ctx.fillStyle = fade;
      ctx.fillRect(0, 0, W, H);
    }

    function drawNebula(p, t) {
      ctx.save();
      ctx.globalCompositeOperation = "lighter";
      const cx = W / 2;
      const cy = 420;
      for (let i = 0; i < 3; i++) {
        const radius = 132 + i * 36 + Math.sin(t * .7 + i) * 10;
        const grd = ctx.createRadialGradient(cx, cy, radius * .18, cx, cy, radius);
        const color = i === 0 ? p.glowA : i === 1 ? p.glowC : p.glowB;
        grd.addColorStop(0, color + ".00)");
        grd.addColorStop(.42, color + ".07)");
        grd.addColorStop(1, color + ".00)");
        ctx.fillStyle = grd;
        ctx.beginPath();
        ctx.ellipse(cx + Math.sin(t + i) * 22, cy + Math.cos(t * .8 + i) * 18, radius * 1.05, radius * .78, t * .12 + i, 0, Math.PI * 2);
        ctx.fill();
      }
      ctx.restore();
    }

    function pointOnRibbon(a, layer, t) {
      const cx = W / 2;
      const cy = 424;
      const breathing = 1 + Math.sin(t * 1.08 + layer * .7) * .035;
      const rough =
        Math.sin(a * 3 + t * .85 + layer + seed) * 13 +
        Math.sin(a * 7 - t * .54 + layer * 1.9) * 8 +
        Math.sin(a * 11 + seed * .13) * 4;
      const rx = (106 + layer * 4 + rough) * breathing;
      const ry = (134 + layer * 3 + rough * .68) * breathing;
      const twist = a + Math.sin(t * .32 + layer) * .22 + layer * .025;
      return {
        x: cx + Math.cos(twist) * rx + Math.sin(a * 5 + t + layer) * 9,
        y: cy + Math.sin(twist) * ry + Math.cos(a * 4 - t * .7 + layer) * 13
      };
    }

    function drawRibbon(p, t) {
      ctx.save();
      ctx.globalCompositeOperation = "lighter";
      ctx.lineCap = "round";

      const layers = mode === 2 ? 42 : 66;
      for (let l = 0; l < layers; l++) {
        const alpha = mode === 2 ? .088 : .064;
        const hueShift = Math.sin(l * .22 + t) * .5 + .5;
        const color =
          mode === 0 && hueShift > .72 ? p.glowC :
          mode === 1 && hueShift < .34 ? p.glowA :
          p.line;
        ctx.strokeStyle = color + alpha + ")";
        ctx.lineWidth = mode === 2 ? .86 : .66;
        ctx.beginPath();
        for (let s = 0; s <= 236; s++) {
          const a = (s / 236) * Math.PI * 2 + t * .075 + l * .002;
          const pt = pointOnRibbon(a, l, t);
          if (s === 0) ctx.moveTo(pt.x, pt.y);
          else ctx.lineTo(pt.x, pt.y);
        }
        ctx.closePath();
        ctx.stroke();
      }
      ctx.restore();
    }

    function drawHighlightContours(t) {
      ctx.save();
      ctx.globalCompositeOperation = "lighter";
      ctx.lineCap = "round";
      ctx.lineJoin = "round";
      const highlightLayers = [3, 11, 19, 28, 38, 50, 62];
      highlightLayers.forEach((layer, index) => {
        const alpha = .19 - index * .014;
        ctx.strokeStyle = `rgba(255, 255, 255, ${alpha})`;
        ctx.lineWidth = index < 2 ? .82 : .58;
        ctx.shadowColor = "rgba(255, 255, 255, .45)";
        ctx.shadowBlur = index < 3 ? 7 : 4;
        ctx.beginPath();
        for (let s = 0; s <= 210; s++) {
          const u = s / 210;
          const a = u * Math.PI * 2 + t * .08 + index * .025;
          const pt = pointOnRibbon(a, layer, t * .96);
          if (s === 0) ctx.moveTo(pt.x, pt.y);
          else ctx.lineTo(pt.x, pt.y);
        }
        ctx.closePath();
        ctx.stroke();
      });

      ctx.shadowBlur = 10;
      ctx.shadowColor = "rgba(255, 255, 255, .75)";
      for (let i = 0; i < 18; i++) {
        const a = (i / 18) * Math.PI * 2 + t * .2;
        const pt = pointOnRibbon(a, 58 + (i % 4), t);
        ctx.fillStyle = "rgba(255, 255, 255, .78)";
        ctx.beginPath();
        ctx.arc(pt.x, pt.y, i % 3 === 0 ? 1.55 : 1.05, 0, Math.PI * 2);
        ctx.fill();
      }
      ctx.restore();
    }

    function drawWhiteTrails(p, t) {
      ctx.save();
      ctx.globalCompositeOperation = "lighter";
      ctx.lineCap = "round";
      const arms = 11;
      for (let arm = 0; arm < arms; arm++) {
        const base = (arm / arms) * Math.PI * 2 + t * .18;
        for (let l = 0; l < 6; l++) {
          ctx.strokeStyle = p.line + (.07 + l * .016) + ")";
          ctx.lineWidth = .78;
          ctx.beginPath();
          for (let s = 0; s < 80; s++) {
            const u = s / 79;
            const curve = base + u * 1.24 + Math.sin(u * 5 + t + arm) * .16;
            const r = 40 + u * (102 + Math.sin(arm + t) * 16) + l * 3;
            const x = W / 2 + Math.cos(curve) * r;
            const y = 424 + Math.sin(curve) * r * .9;
            if (s === 0) ctx.moveTo(x, y);
            else ctx.lineTo(x, y);
          }
          ctx.stroke();
        }

        const endA = base + 1.24 + Math.sin(t + arm) * .16;
        for (let n = 0; n < 3; n++) {
          const r = 146 + n * 7 + Math.sin(t * 1.5 + n + arm) * 4;
          const x = W / 2 + Math.cos(endA + n * .045) * r;
          const y = 424 + Math.sin(endA + n * .045) * r * .9;
          ctx.fillStyle = p.point + (.68 + n * .12) + ")";
          ctx.beginPath();
          ctx.arc(x, y, 1.85, 0, Math.PI * 2);
          ctx.fill();
        }
      }
      ctx.restore();
    }

    function drawParticles(p, t) {
      ctx.save();
      ctx.globalCompositeOperation = "lighter";
      for (let i = 0; i < 72; i++) {
        const n = Math.sin(i * 91.7 + seed) * 10000;
        const xBase = (n - Math.floor(n)) * W;
        const yBase = ((Math.sin(i * 57.4 + seed * .3) * 10000) % 1 + 1) % 1 * H;
        const x = xBase + Math.sin(t * .25 + i) * 7;
        const y = (yBase + t * (2 + i % 5) * tempo) % H;
        const a = y > 140 && y < 760 ? .26 : .08;
        ctx.fillStyle = p.point + a + ")";
        ctx.beginPath();
        ctx.arc(x, y, .55 + (i % 3) * .24, 0, Math.PI * 2);
        ctx.fill();
      }
      ctx.restore();
    }

    function draw(t) {
      const p = palette();
      fillBackground(p);
      drawNebula(p, t);
      if (mode === 2) {
        drawWhiteTrails(p, t);
        drawRibbon(p, t * .52);
      } else {
        drawRibbon(p, t);
        drawHighlightContours(t);
        drawWhiteTrails(p, t * .34);
      }
      drawParticles(p, t);
    }

    function frame(now) {
      const delta = Math.min((now - last) / 1000, .04);
      last = now;
      if (playing) phase += delta * tempo;
      draw(phase);
      requestAnimationFrame(frame);
    }

    playPause.addEventListener("click", () => {
      playing = !playing;
      playPause.classList.toggle("paused", !playing);
      playPause.classList.toggle("active", playing);
      playPause.setAttribute("aria-label", playing ? "暂停" : "播放");
      tempo = playing ? 1 : .18;
    });

    regenerate.addEventListener("click", () => {
      seed = Math.random() * 1000;
      phase += 4.2;
      const next = (notes.indexOf(aiText.textContent) + 1) % notes.length;
      aiText.textContent = notes[next];
      const bpm = 58 + Math.round(Math.random() * 5);
      heartRate.textContent = `当前心率：${bpm}次/分钟`;
      regenerate.animate(
        [
          { transform: "rotate(0deg) scale(1)" },
          { transform: "rotate(180deg) scale(.94)" },
          { transform: "rotate(360deg) scale(1)" }
        ],
        { duration: 520, easing: "cubic-bezier(.2,.7,.2,1)" }
      );
    });

    window.addEventListener("resize", resize);
    resize();
    requestAnimationFrame(frame);
  </script>
</body>
</html>
